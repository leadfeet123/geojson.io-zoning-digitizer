<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="geojson.io" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://api.mapbox.com/" />
    <link
      rel="icon"
      href="https://static-assets.mapbox.com/branding/favicon/v2/favicon-32x32.png?v=gAd4JjrGWl"
    />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Code+Pro&family=Open+Sans:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Add segment tracking for tool usage -->
    <script src="https://docs.mapbox.com/analytics.min.js"></script>
    <!-- Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      // Disable automatic page_view tracking to prevent the ?map= camera
      // parameter (updated via replaceState on every map move) from firing
      // a page_view on each interaction.
      gtag('config', '%VITE_GA_MEASUREMENT_ID%', { send_page_view: false });
      // Fire a single page_view with a clean URL (no query params).
      gtag('event', 'page_view', {
        page_location: window.location.origin + window.location.pathname + window.location.hash
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./pages/index.tsx"></script>
  </body>
</html>
